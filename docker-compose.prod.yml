# =============================================================
# docker-compose.prod.yml — Entorno de PRODUCCIÓN
#
# Arranque:
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
#
# Diferencias frente a dev:
#   - Frontend servido por Nginx (build estático)
#   - Sin bind mounts ni HMR
#   - El front actúa como reverse proxy de /api/* hacia la API
#   - SQL Server NO expone su puerto al host
#   - Restart policies más estrictas
#
# Nota: el TLS (HTTPS) se asume gestionado por un reverse proxy
# externo (Cloudflare, Traefik, Caddy, Nginx Proxy Manager, etc.)
# delante de este compose, o por el host de despliegue.
# =============================================================

services:

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: fishclub-db-prod
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SA_PASSWORD}
      MSSQL_PID: "Developer"   # Cambia a Standard/Enterprise si tienes licencia
    volumes:
      - mssql_data_prod:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: always

  api:
    build:
      context: .
      dockerfile: FishClubAlginet.API/Dockerfile
    container_name: fishclub-api-prod
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__LocalConnectionString: "Server=db,1433;Database=FishClubAlginetDb;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;Encrypt=False;"
      JwtSettings__SecretKey: ${JWT_SECRET_KEY}
      JwtSettings__Issuer: ${JWT_ISSUER:-FishClubAlginetAPI}
      JwtSettings__Audience: ${JWT_AUDIENCE:-FishClubAlginetUsers}
      JwtSettings__DurationInMinutes: ${JWT_DURATION_MINUTES:-60}
    expose:
      - "8080"
    restart: always

  frontend:
    build:
      context: ./fishclubalginet-frontend
      dockerfile: Dockerfile
      args:
        # En producción el front llama a /api y Nginx lo proxya internamente
        VITE_API_BASE_URL: /api
    container_name: fishclub-frontend-prod
    depends_on:
      - api
    ports:
      - "${PUBLIC_HTTP_PORT:-80}:80"
    restart: always

volumes:
  mssql_data_prod:
    driver: local
